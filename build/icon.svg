    <rect x="108" y="124" width="300" height="300" rx="14" fill="url(#y)" transform="rotate(-10 256 270)"></rect>
    <rect x="128" y="100" width="290" height="290" rx="14" fill="url(#p)" transform="rotate(8 268 240)"></rect>
    <rect x="106" y="112" width="300" height="300" rx="14" fill="url(#b)" transform="rotate(-2 256 256)"></rect>
  </g>
  <g transform="translate(106 112) rotate(-2 150 150)" opacity="0.22">
    <rect x="28" y="140" width="220" height="8" rx="4" fill="#000"></rect>
    <rect x="28" y="170" width="170" height="8" rx="4" fill="#000"></rect>
  </g>
