name: Release

# Triggered by pushing a tag like v1.0.0, v1.0.1, v1.2.3, etc.
#
# Two-stage flow:
#   1. `build` — runs on Linux + macOS in parallel. Each runner builds its
#      platform artifacts (Linux: .deb / .AppImage / .snap; macOS: .dmg / .zip)
#      and uploads them as workflow artifacts (NOT to the release yet). The
#      Linux job also publishes the .snap to the Snap Store.
#   2. `release` — depends on `build` finishing on every matrix entry. Pulls
#      down all the workflow artifacts and attaches them to the GitHub Release
#      in one shot. This eliminates a race the old "each runner uploads to
#      the release as it finishes" flow had: a user whose app's update check
#      fired between the first runner finishing and the second runner finishing
#      would see the release exists but get a 404 on their platform's file.

on:
  push:
    tags:
      - 'v*'
  # Manual trigger for recovery when release-please creates a tag via
  # GITHUB_TOKEN — those token-originated tag-push events don't cascade
  # into this workflow, so we occasionally need to kick it off by hand:
  #   gh workflow run release.yml --ref v1.4.0
  workflow_dispatch:

permissions:
  contents: write   # required so the release-upload action can write to the Releases API

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install snapcraft (Linux only)
        # electron-builder's snap target needs the snapcraft CLI to package
        # the .snap. snapd is preinstalled on ubuntu-latest runners.
        if: matrix.os == 'ubuntu-latest'
        run: sudo snap install snapcraft --classic

      - name: Build (electron-builder picks the host platform)
        # --publish never tells electron-builder to JUST build, not try to publish to
        # GitHub itself. The release job below does the publishing, which keeps the
        # release-creation logic in one place.
        run: npx electron-builder --publish never
        env:
          # Skip code-signing on macOS so the build doesn't fail without an Apple Dev cert.
          # Users get a Gatekeeper warning on first launch; right-click → Open bypasses it.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Locate snap file (Linux only)
        # snapcore/action-publish wants a single path, no globs. Find it once
        # so subsequent step references it via the output.
        if: matrix.os == 'ubuntu-latest'
        id: snap
        run: echo "path=$(ls dist/*.snap | head -n 1)" >> "$GITHUB_OUTPUT"

      - name: Publish snap to Snap Store (Linux only)
        # SNAPCRAFT_STORE_CREDENTIALS is set in repo settings → Secrets and
        # was generated locally via:
        #   snapcraft export-login --snaps=sticky-notes-canvas --channels=stable -
        # Snap publish happens here (not in the release job) because it doesn't
        # affect the GitHub Release race we're fixing — snap distribution is
        # independent of GitHub Releases.
        if: matrix.os == 'ubuntu-latest'
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.snap.outputs.path }}
          release: stable

      - name: Upload built artifacts for the release job
        # Stash artifacts at the workflow level so the release job can pick
        # them up after BOTH matrix entries finish. Each matrix entry uploads
        # to a uniquely-named bundle so they don't collide.
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.deb
            dist/*.AppImage
            dist/*.snap
            dist/*.dmg
            dist/*.zip
          if-no-files-found: ignore   # Linux won't have .dmg, Mac won't have .deb/.snap

  release:
    name: Create GitHub Release
    needs: build           # waits for ALL matrix entries of `build` to succeed
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          # No `name:` filter — pull everything the build job uploaded.

      - name: Attach all artifacts to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.snap
            artifacts/**/*.dmg
            artifacts/**/*.zip
          fail_on_unmatched_files: false
          # release-please writes the release notes when it creates the
          # release on release-PR merge — don't clobber them with the
          # raw git log.
          generate_release_notes: false
